<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================================
         TITLE & META
    ============================================================ -->
    <title>Best AI Tools 2026 | Top Rated AI Directory & Free Apps</title>
    <meta
      name="description"
      content="Discover the best AI tools of 2026. Our curated global directory features 500+ top-rated free & paid AI apps for writing, video, coding, design, and productivity. Updated daily."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://theresanaiforthat.pro/" />
    <meta name="theme-color" content="#05050f" />

    <!-- ============================================================
         CRITICAL: INLINE ABOVE-THE-FOLD CSS
         Prevents render-blocking stylesheet — paste your Hero +
         Navbar critical styles here. This alone can save 0.3-0.8s FCP.
    ============================================================ -->
    <style>
      /* Reset + base — keeps page from jumping before React hydrates */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: #05050f;
        color: #e5e7eb;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      /* Prevent layout shift while React loads */
      #root { min-height: 100vh; }
      /* Skeleton shimmer for above-fold cards */
      .skeleton {
        background: linear-gradient(90deg, #1a1a2e 25%, #222240 50%, #1a1a2e 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 8px;
      }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>

    <!-- ============================================================
         FONTS — Non-blocking pattern
         FIX: removed double <link> + <link rel="preload"> combo which
         caused the font to be downloaded TWICE. Use preload only once,
         then swap via onload. The noscript fallback handles no-JS.
    ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- ============================================================
         PRECONNECT — Your actual data sources
         FIX: Add your real Supabase URL. DuckDuckGo favicons are
         fetched per-tool so preconnecting here saves the first request.
    ============================================================ -->
    <link rel="dns-prefetch" href="//icons.duckduckgo.com" />
    <link rel="preconnect" href="https://icons.duckduckgo.com" crossorigin />
    <!-- Replace with your actual Supabase project URL -->
    <!-- <link rel="preconnect" href="https://YOUR_PROJECT.supabase.co" crossorigin /> -->

    <!-- ============================================================
         LCP PRELOAD
         FIX: Only preload what is ACTUALLY the LCP element.
         If your hero has no image (just text + gradient), remove this.
         If it does have an image, point to the exact file served.
         Wrong preloads hurt more than no preload.
    ============================================================ -->
    <!-- Uncomment and point to your real hero image if one exists:
    <link
      rel="preload"
      as="image"
      href="/hero.webp"
      fetchpriority="high"
      imagesrcset="/hero-480.webp 480w, /hero-800.webp 800w, /hero.webp 1200w"
      imagesizes="100vw"
    />
    -->

    <!-- ============================================================
         FAVICON
         FIX: Provide multiple formats for broad browser support.
         SVG is best — scales perfectly, tiny file size.
    ============================================================ -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ============================================================
         OPEN GRAPH / TWITTER
    ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Best AI Tools 2026 | Top Rated AI Directory" />
    <meta
      property="og:description"
      content="Find the best AI tools for any task. Curated list of 500+ free & paid AI apps."
    />
    <meta property="og:image" content="https://theresanaiforthat.pro/og-image.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://theresanaiforthat.pro/" />
    <meta property="og:site_name" content="Best AI Tools" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Best AI Tools 2026 | Top AI Directory" />
    <meta name="twitter:description" content="Explore the best AI tools of 2026." />
    <meta name="twitter:image" content="https://theresanaiforthat.pro/og-image.webp" />

    <!-- ============================================================
         STRUCTURED DATA
    ============================================================ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Best AI Tools",
        "alternateName": "Best AI Tools Directory",
        "url": "https://theresanaiforthat.pro/",
        "description": "The ultimate directory for the best AI tools of 2026.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://theresanaiforthat.pro/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Best AI Tools",
          "logo": {
            "@type": "ImageObject",
            "url": "https://theresanaiforthat.pro/logo.webp",
            "width": 512,
            "height": 512
          }
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Best AI Writing Tools",
            "url": "https://theresanaiforthat.pro/category/writing"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Best AI Video Generators",
            "url": "https://theresanaiforthat.pro/category/video"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": "Best AI Image Generators",
            "url": "https://theresanaiforthat.pro/category/image"
          }
        ]
      }
    </script>
  </head>

  <body>
    <!-- ============================================================
         INLINE NOSCRIPT STYLES — avoids a flash of unstyled noscript
    ============================================================ -->
    <noscript>
      <style>
        body { display: flex; align-items: center; justify-content: center; }
        .noscript-msg { max-width: 400px; text-align: center; padding: 2rem; }
      </style>
      <div class="noscript-msg">
        <h1>JavaScript Required</h1>
        <p>This AI tools directory requires JavaScript. Please enable it in your browser settings.</p>
      </div>
    </noscript>

    <!-- ROOT -->
    <div id="root"></div>

    <!-- ============================================================
         REACT ENTRY
         FIX: removed `defer` from a `type="module"` script — modules
         are deferred by default. Adding defer explicitly is redundant
         and can cause double-defer behaviour in some browsers.
    ============================================================ -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
