<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════
         TITLE & META
    ═══════════════════════════════════════ -->
    <title>Best AI Tools 2026 | Top Rated AI Directory & Free Apps</title>
    <meta
      name="description"
      content="Discover the best AI tools of 2026. Our curated global directory features 500+ top-rated free & paid AI apps for writing, video, coding, design, and productivity. Updated daily."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://theresanaiforthat.pro/" />
    <meta name="theme-color" content="#05050f" />

    <!-- ═══════════════════════════════════════
         PRECONNECTS — MUST BE FIRST
         These eliminate DNS+TCP+TLS penalty before any fetch fires.
         ORDER MATTERS: put before fonts, before scripts, before everything.
    ═══════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://icons.duckduckgo.com" crossorigin />
    <!-- ⚠️ REPLACE with your actual Supabase project URL -->
    <!-- <link rel="preconnect" href="https://YOUR_PROJECT_ID.supabase.co" crossorigin /> -->

    <!-- ═══════════════════════════════════════
         CRITICAL INLINE CSS
         Eliminates render-blocking stylesheet request.
         Browser paints above-fold immediately.
    ═══════════════════════════════════════ -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        scroll-behavior: smooth;
        scrollbar-gutter: stable;
      }

      body {
        background: #05050f;
        color: #e5e7eb;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100svh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100svh;
        isolation: isolate;
      }

      /* Navbar skeleton — prevents layout shift before React mounts */
      #root:empty::before {
        content: '';
        display: block;
        height: 64px;
        background: rgba(5, 5, 15, 0.95);
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      /* Hero skeleton — prevents LCP element shift */
      #root:empty::after {
        content: '';
        display: block;
        min-height: 420px;
        background: linear-gradient(
          180deg,
          rgba(124,58,237,0.04) 0%,
          transparent 100%
        );
      }

      /* Skeleton shimmer for loading states */
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          rgba(255,255,255,0.04) 25%,
          rgba(255,255,255,0.08) 50%,
          rgba(255,255,255,0.04) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s linear infinite;
        border-radius: 8px;
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      @font-face {
        font-family: 'Inter';
        font-display: swap;
      }
    </style>

    <!-- ═══════════════════════════════════════
         FONT — NON-BLOCKING
         Preload + onload pattern — downloads once, never twice.
    ═══════════════════════════════════════ -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- ═══════════════════════════════════════
         DNS PREFETCH — lower-priority origins
    ═══════════════════════════════════════ -->
    <link rel="dns-prefetch" href="//icons.duckduckgo.com" />

    <!-- ═══════════════════════════════════════
         FAVICONS
    ═══════════════════════════════════════ -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ═══════════════════════════════════════
