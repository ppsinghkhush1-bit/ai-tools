<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════
         TITLE & META
    ═══════════════════════════════════════ -->
    <title>Best AI Tools 2026 | Top Rated AI Directory & Free Apps</title>
    <meta
      name="description"
      content="Discover the best AI tools of 2026. Our curated global directory features 500+ top-rated free & paid AI apps for writing, video, coding, design, and productivity. Updated daily."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://theresanaiforthat.pro/" />
    <meta name="theme-color" content="#05050f" />

    <!-- ═══════════════════════════════════════
         CRITICAL INLINE CSS
         WHY: Eliminates render-blocking stylesheet request.
         The browser can paint the above-fold content immediately
         without waiting for any external CSS to download.
         Put your Hero + Navbar styles here.
    ═══════════════════════════════════════ -->
    <style>
      /* Minimal reset — prevents CLS before Tailwind loads */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        scroll-behavior: smooth;
        /* Prevents width from changing when scrollbar appears — kills CLS */
        scrollbar-gutter: stable;
      }

      body {
        background: #05050f;
        color: #e5e7eb;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100svh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent text from being invisible before Inter loads */
        font-display: swap;
      }

      /* Prevent layout shift while React bootstraps */
      #root {
        min-height: 100svh;
        isolation: isolate;
      }

      /* Above-fold Navbar skeleton — prevents layout shift */
      #root-nav-placeholder {
        height: 64px;
        background: rgba(5, 5, 15, 0.95);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        display: flex;
        align-items: center;
        padding: 0 1.5rem;
      }

      /* Skeleton animation used by loading states */
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          rgba(255,255,255,0.04) 25%,
          rgba(255,255,255,0.08) 50%,
          rgba(255,255,255,0.04) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s linear infinite;
        border-radius: 8px;
      }

      /* Images — prevent layout shift */
      img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      /* Prevent invisible text on slow connections */
      @font-face {
        font-family: 'Inter';
        font-display: swap;
      }
    </style>

    <!-- ═══════════════════════════════════════
         FONT — NON-BLOCKING
         WHY: Single preload+onload pattern. Your original had both
         <link rel="preload"> AND <link rel="stylesheet"> pointing to
         the same URL — that downloaded Inter TWICE.
         300 weight removed — you only use 400/500/600/700 in your CSS.
    ═══════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- ═══════════════════════════════════════
         PRECONNECT — ALL THIRD-PARTY ORIGINS
         WHY: Each origin needs a DNS lookup + TCP handshake + TLS
         before the first byte. Preconnecting eliminates that ~150ms
         penalty for the most common fetch targets.
    ═══════════════════════════════════════ -->
    <!-- Favicon fallbacks for tools without stored images -->
    <link rel="dns-prefetch" href="//icons.duckduckgo.com" />
    <link rel="preconnect" href="https://icons.duckduckgo.com" crossorigin />

    <!-- ⚠️ REPLACE with your actual Supabase project URL -->
    <!-- <link rel="preconnect" href="https://YOUR_PROJECT_ID.supabase.co" crossorigin /> -->

    <!-- ═══════════════════════════════════════
         LCP PRELOAD
         WHY: Tells browser to fetch the largest contentful paint
         element at the highest priority, before it discovers it in CSS.
         IMPORTANT: Only uncomment if your hero HAS a real image.
         A wrong preload wastes bandwidth and HURTS the score.
         If your LCP is text (e.g. "Best AI Tools Directory"), skip this.
    ═══════════════════════════════════════ -->
    <!--
    <link
      rel="preload"
      as="image"
      href="/hero.webp"
      fetchpriority="high"
      imagesrcset="/hero-480.webp 480w, /hero-800.webp 800w, /hero.webp 1200w"
      imagesizes="100vw"
    />
    -->

    <!-- ═══════════════════════════════════════
         FAVICONS
         WHY: .ico for legacy, .svg scales perfectly at any size,
         apple-touch-icon for iOS homescreen.
    ═══════════════════════════════════════ -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ═══════════════════════════════════════
         OPEN GRAPH / TWITTER
    ═══════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Best AI Tools 2026 | Top Rated AI Directory" />
    <meta property="og:description" content="Find the best AI tools for any task. Curated list of 500+ free & paid AI apps." />

    <meta property="og:url" content="https://theresanaiforthat.pro/" />

    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Best AI Tools 2026 | Top AI Directory" />
    <meta name="twitter:description" content="Explore 500+ best AI tools of 2026. Free & paid apps for every task." />
    <meta name="twitter:image" content="https://theresanaiforthat.pro/og-image.webp" />
    <meta name="twitter:image:alt" content="Best AI Tools Directory 2026" />

    <!-- ═══════════════════════════════════════
         STRUCTURED DATA
         FIX: SearchAction target updated to object syntax (new spec).
         Added image dimensions to ImageObject.
    ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Best AI Tools",
      "alternateName": "Best AI Tools Directory",
      "url": "https://theresanaiforthat.pro/",
      "description": "The ultimate directory for the best AI tools of 2026.",
      "inLanguage": "en-US",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://theresanaiforthat.pro/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Best AI Tools",
        "url": "https://theresanaiforthat.pro/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://theresanaiforthat.pro/logo.webp",
          "width": 512,
          "height": 512
        }
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "AI Tool Categories",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Best AI Writing Tools",    "url": "https://theresanaiforthat.pro/?category=Writing" },
        { "@type": "ListItem", "position": 2, "name": "Best AI Video Generators", "url": "https://theresanaiforthat.pro/?category=Video" },
        { "@type": "ListItem", "position": 3, "name": "Best AI Image Generators", "url": "https://theresanaiforthat.pro/?category=Image" },
        { "@type": "ListItem", "position": 4, "name": "Best AI Coding Tools",     "url": "https://theresanaiforthat.pro/?category=Coding" }
      ]
    }
    </script>
  </head>

  <body>
    <!-- No-JS fallback -->
    <noscript>
      <style>
        .noscript-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; text-align:center; }
        .noscript-wrap h1 { font-size:1.5rem; margin-bottom:0.5rem; }
        .noscript-wrap p  { color:#9ca3af; }
      </style>
      <div class="noscript-wrap">
        <div>
          <h1>JavaScript Required</h1>
          <p>This AI tools directory requires JavaScript. Please enable it in your browser settings.</p>
        </div>
      </div>
    </noscript>

    <div id="root"></div>

    <!-- ═══════════════════════════════════════
         SCRIPT ENTRY
         WHY: type="module" is deferred by default per spec.
         Do NOT add defer — it causes double-defer in some browsers.
         Do NOT add async — breaks ES module import order.
    ═══════════════════════════════════════ -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
